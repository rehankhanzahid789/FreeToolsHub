<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>Slug Generator</h1>
      <p>Turn a title or sentence into a clean, lowercase, URL-friendly slug.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel">
        <div class="field">
          <label for="sg-input">Text</label>
          <textarea id="sg-input" class="textarea" placeholder="e.g. My Blog Post, Part 2!" style="min-height:100px;"></textarea>
        </div>

        <div class="field">
          <label for="sg-separator">Separator</label>
          <select id="sg-separator" class="select">
            <option value="-">Hyphen ( - )</option>
            <option value="_">Underscore ( _ )</option>
          </select>
        </div>

        <div class="field">
          <label class="checkbox-row" style="font-weight:600;color:var(--color-primary-dark);">
            <input type="checkbox" id="sg-lowercase" checked />
            Force lowercase
          </label>
        </div>

        <div class="actions">
          <button id="sg-copy" class="btn btn-accent" type="button">Copy slug</button>
        </div>

        <div class="field">
          <label>Slug</label>
          <input id="sg-output" class="input" type="text" readonly />
        </div>
      </section>

      <aside>
        <!-- Adsterra: paste sidebar/native ad code below this comment -->
        <div class="ad-slot ad-slot--sidebar" aria-label="Advertisement"></div>
      </aside>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
    <div class="ad-slot ad-slot--bottom" aria-label="Advertisement"></div>
