<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>Random Number & Item Picker</h1>
      <p>Roll a random number in a range, or pick a random item from your own list.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel">
        <div class="field">
          <label style="font-weight:700;color:var(--color-primary-dark);">Random number</label>
          <div class="row">
            <div class="field"><label for="rp-min">Min</label><input id="rp-min" class="input" type="number" value="1" /></div>
            <div class="field"><label for="rp-max">Max</label><input id="rp-max" class="input" type="number" value="100" /></div>
          </div>
          <div class="actions">
            <button id="rp-roll" class="btn btn-accent" type="button">Generate</button>
          </div>
          <div class="result-box" id="rp-number-result" style="font-size:1.5rem;font-weight:700;text-align:center;">—</div>
        </div>

        <hr style="border:none;border-top:1px solid var(--color-border);margin:24px 0;" />

        <div class="field">
          <label style="font-weight:700;color:var(--color-primary-dark);">Pick from a list</label>
          <textarea id="rp-list" class="textarea" placeholder="Enter one item per line…
Pizza
Sushi
Tacos
Burgers" style="min-height:120px;"></textarea>
          <div class="actions">
            <button id="rp-pick" class="btn btn-primary" type="button">Pick random item</button>
          </div>
          <div class="result-box" id="rp-list-result" style="font-size:1.3rem;font-weight:700;text-align:center;">—</div>
        </div>
      </section>

      <aside>
        <!-- Adsterra: paste sidebar/native ad code below this comment -->
        <div class="ad-slot ad-slot--sidebar" aria-label="Advertisement"></div>
      </aside>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
    <div class="ad-slot ad-slot--bottom" aria-label="Advertisement"></div>
