<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>CSS Gradient Generator</h1>
      <p>Pick colors and an angle to build a linear or radial gradient, then copy the CSS.</p>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel" style="grid-column: 1 / -1;">
        <div id="cg-preview" class="cg-preview"></div>

        <div class="row" style="margin-top:16px;">
          <div class="field">
            <label for="cg-type">Type</label>
            <select id="cg-type" class="select">
              <option value="linear">Linear</option>
              <option value="radial">Radial</option>
            </select>
          </div>
          <div class="field" id="cg-angle-field">
            <label for="cg-angle">Angle</label>
            <div class="cg-row"><input id="cg-angle" type="range" min="0" max="360" value="90" style="flex:1;" /><span id="cg-angle-val">90°</span></div>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="cg-color1">Color 1</label>
            <input id="cg-color1" class="input" type="color" value="#1c7ed6" style="height:44px;padding:4px;" />
          </div>
          <div class="field">
            <label for="cg-color2">Color 2</label>
            <input id="cg-color2" class="input" type="color" value="#12b886" style="height:44px;padding:4px;" />
          </div>
        </div>

        <div class="actions">
          <button id="cg-copy" class="btn btn-accent" type="button">Copy CSS</button>
        </div>
        <div class="field">
          <label>CSS</label>
          <textarea id="cg-output" class="textarea" readonly style="min-height:70px;"></textarea>
        </div>
      </section>
