  <style>
    .cl-bar-track { height:8px; background:var(--color-track-bg); border-radius:999px; overflow:hidden; margin-top:6px; }
    .cl-bar-fill { height:100%; background:var(--color-primary); transition:width .15s, background .15s; }
    .cl-bar-fill.over { background: var(--color-danger); }
    .cl-platform { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--color-border); }
    .cl-platform:last-child { border-bottom:none; }
    .cl-platform__name { font-weight:600; color:var(--color-heading); font-size:0.92rem; }
    .cl-platform__count { font-family:ui-monospace,monospace; font-size:0.85rem; color:var(--color-text-muted); }
    .cl-platform__count.over { color:var(--color-danger); font-weight:700; }
