<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>BMI Calculator</h1>
      <p>Work out your Body Mass Index from height and weight, in metric or imperial units.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel">
        <div class="field">
          <label for="bmi-units">Units</label>
          <select id="bmi-units" class="select">
            <option value="metric">Metric (kg, cm)</option>
            <option value="imperial">Imperial (lb, in)</option>
          </select>
        </div>

        <div id="bmi-metric-fields" class="row">
          <div class="field">
            <label for="bmi-weight-kg">Weight (kg)</label>
            <input id="bmi-weight-kg" class="input" type="number" min="0" step="0.1" placeholder="e.g. 70" />
          </div>
          <div class="field">
            <label for="bmi-height-cm">Height (cm)</label>
            <input id="bmi-height-cm" class="input" type="number" min="0" step="0.1" placeholder="e.g. 175" />
          </div>
        </div>

        <div id="bmi-imperial-fields" class="row" hidden>
          <div class="field">
            <label for="bmi-weight-lb">Weight (lb)</label>
            <input id="bmi-weight-lb" class="input" type="number" min="0" step="0.1" placeholder="e.g. 154" />
          </div>
          <div class="field">
            <label for="bmi-height-in">Height (in)</label>
            <input id="bmi-height-in" class="input" type="number" min="0" step="0.1" placeholder="e.g. 69" />
          </div>
        </div>

        <div id="bmi-error" class="error-box" hidden></div>

        <div class="stat-grid">
          <div class="stat"><div id="bmi-value" class="stat__value">—</div><div class="stat__label">BMI</div></div>
          <div class="stat"><div id="bmi-category" class="stat__value">—</div><div class="stat__label">Category</div></div>
        </div>
      </section>

      <aside>
        <!-- Adsterra: paste sidebar/native ad code below this comment -->
        <div class="ad-slot ad-slot--sidebar" aria-label="Advertisement"></div>
      </aside>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
