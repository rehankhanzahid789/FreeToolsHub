<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lorem Ipsum Generator — FreeToolsHub</title>
  <meta name="description" content="Generate placeholder Lorem Ipsum text as paragraphs, sentences, or words." />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/tool.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>Lorem Ipsum Generator</h1>
      <p>Generate placeholder text for mockups and layouts.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel">
        <div class="row">
          <div class="field">
            <label for="li-type">Generate</label>
            <select id="li-type" class="select">
              <option value="paragraphs">Paragraphs</option>
              <option value="sentences">Sentences</option>
              <option value="words">Words</option>
            </select>
          </div>
          <div class="field">
            <label for="li-count">Amount</label>
            <input id="li-count" class="input" type="number" min="1" max="50" value="3" />
          </div>
        </div>
        <div class="field">
          <label class="checkbox-row" style="font-weight:600;color:var(--color-primary-dark);">
            <input type="checkbox" id="li-classic" checked />
            Start with "Lorem ipsum dolor sit amet…"
          </label>
        </div>
        <div class="actions">
          <button id="li-generate" class="btn btn-accent" type="button">Generate</button>
          <button id="li-copy" class="btn btn-outline" type="button">Copy</button>
        </div>
        <div class="field">
          <label>Result</label>
          <div id="li-output" class="result-box" style="white-space:pre-wrap; font-family: var(--font-sans);"></div>
        </div>
      </section>

      <aside>
        <!-- Adsterra: paste sidebar/native ad code below this comment -->
        <div class="ad-slot ad-slot--sidebar" aria-label="Advertisement"></div>
      </aside>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
    <div class="ad-slot ad-slot--bottom" aria-label="Advertisement"></div>
  </main>

  <div id="site-footer"></div>
  <script src="../../js/layout.js" data-root="../../"></script>
  <script src="../../js/ads.js"></script>
  <script src="script.js"></script>
</body>
</html>
