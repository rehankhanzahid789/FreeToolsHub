        <div id="jwt-error" class="error-box" hidden></div>

        <div class="field">
          <label>Header</label>
          <div id="jwt-header" class="result-box" style="white-space:pre-wrap;">—</div>
        </div>
        <div class="field">
          <label>Payload</label>
          <div id="jwt-payload" class="result-box" style="white-space:pre-wrap;">—</div>
        </div>
        <div class="field">
          <label>Signature (raw, not verified)</label>
          <div id="jwt-signature" class="result-box" style="word-break:break-all;">—</div>
        </div>
      </section>
