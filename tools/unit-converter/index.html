<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unit Converter — FreeToolsHub</title>
  <meta name="description" content="Convert length, weight and temperature units." />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/tool.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>Unit Converter</h1>
      <p>Convert length, weight and temperature.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel">
        <div class="field">
          <label for="uc-category">Category</label>
          <select id="uc-category" class="select">
            <option value="length">Length</option>
            <option value="weight">Weight</option>
            <option value="temperature">Temperature</option>
          </select>
        </div>

        <div class="row">
          <div class="field">
            <label>From</label>
            <input id="uc-from-val" class="input" type="number" value="1" />
            <select id="uc-from-unit" class="select" style="margin-top:8px;"></select>
          </div>
          <div class="field">
            <label>To</label>
            <input id="uc-to-val" class="input" type="number" readonly />
            <select id="uc-to-unit" class="select" style="margin-top:8px;"></select>
          </div>
        </div>
      </section>

      <aside>
        <!-- Adsterra: paste sidebar/native ad code below this comment -->
        <div class="ad-slot ad-slot--sidebar" aria-label="Advertisement"></div>
      </aside>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
    <div class="ad-slot ad-slot--bottom" aria-label="Advertisement"></div>
  </main>

  <div id="site-footer"></div>
  <script src="../../js/layout.js" data-root="../../"></script>
  <script src="script.js"></script>
</body>
</html>
