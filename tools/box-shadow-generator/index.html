    .bs-preview-wrap { background:#F1F7FB; border-radius:12px; padding:40px; display:flex; align-items:center; justify-content:center; min-height:220px; }
    .bs-preview-box { width:140px; height:100px; background:#fff; border-radius:12px; }
    .bs-row { display:flex; align-items:center; gap:12px; }
    .bs-row input[type="range"] { flex:1; }

<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>Box Shadow Generator</h1>
      <p>Adjust the sliders to design a shadow, then copy the CSS.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel" style="grid-column: 1 / -1;">
        <div class="bs-preview-wrap">
          <div id="bs-box" class="bs-preview-box"></div>
        </div>

        <div class="row" style="margin-top:16px;">
          <div class="field">
            <label>Horizontal offset</label>
            <div class="bs-row"><input id="bs-x" type="range" min="-50" max="50" value="0" /><span id="bs-x-val">0px</span></div>
          </div>
          <div class="field">
            <label>Vertical offset</label>
            <div class="bs-row"><input id="bs-y" type="range" min="-50" max="50" value="10" /><span id="bs-y-val">10px</span></div>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Blur radius</label>
            <div class="bs-row"><input id="bs-blur" type="range" min="0" max="100" value="20" /><span id="bs-blur-val">20px</span></div>
          </div>
          <div class="field">
            <label>Spread radius</label>
            <div class="bs-row"><input id="bs-spread" type="range" min="-50" max="50" value="0" /><span id="bs-spread-val">0px</span></div>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="bs-color">Shadow color</label>
            <input id="bs-color" class="input" type="color" value="#1c3d5a" style="height:44px;padding:4px;" />
          </div>
          <div class="field">
            <label>Opacity</label>
            <div class="bs-row"><input id="bs-opacity" type="range" min="0" max="100" value="30" /><span id="bs-opacity-val">30%</span></div>
          </div>
        </div>
        <div class="field">
          <label class="checkbox-row" style="font-weight:600;color:var(--color-primary-dark);">
            <input type="checkbox" id="bs-inset" />
            Inset shadow
          </label>
        </div>

        <div class="actions">
          <button id="bs-copy" class="btn btn-accent" type="button">Copy CSS</button>
        </div>
        <div class="field">
          <label>CSS</label>
          <textarea id="bs-output" class="textarea" readonly style="min-height:70px;"></textarea>
        </div>
      </section>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
