<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>UUID Generator</h1>
      <p>Generate cryptographically random UUID v4 identifiers.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel">
        <div class="row">
          <div class="field">
            <label for="uuid-count">How many</label>
            <input id="uuid-count" class="input" type="number" min="1" max="200" value="5" />
          </div>
          <div class="field">
            <label for="uuid-case">Letter case</label>
            <select id="uuid-case" class="select">
              <option value="lower">lowercase</option>
              <option value="upper">UPPERCASE</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label class="checkbox-row" style="font-weight:600;color:var(--color-primary-dark);">
            <input type="checkbox" id="uuid-hyphens" checked />
            Include hyphens
          </label>
        </div>
        <div class="actions">
          <button id="uuid-generate" class="btn btn-accent" type="button">Generate</button>
          <button id="uuid-copy" class="btn btn-outline" type="button">Copy all</button>
        </div>
        <div class="field">
          <label>Result</label>
          <textarea id="uuid-output" class="textarea" readonly style="min-height:220px;"></textarea>
        </div>
