<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Text Diff Checker — FreeToolsHub</title>
  <meta name="description" content="Compare two blocks of text and see line-by-line additions and removals highlighted." />
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/brand/logo-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../../assets/brand/logo-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/brand/logo-180.png" />
  <link rel="shortcut icon" href="../../assets/brand/favicon.ico" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/tool.css" />
  <style>
    .diff-line { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9rem; padding: 2px 8px; white-space: pre-wrap; border-radius: 4px; }
    .diff-added { background: #E4F5E9; color: #1e6b3c; }
    .diff-removed { background: #FDECEA; color: var(--color-danger); }
    .diff-same { color: var(--color-text-muted); }
    .diff-box { max-height: 420px; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>Text Diff Checker</h1>
      <p>Paste an original and a changed version to see what was added and removed, line by line.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel" style="grid-column: 1 / -1;">
        <div class="row">
          <div class="field">
            <label for="diff-a">Original text</label>
            <textarea id="diff-a" class="textarea" style="min-height:200px;"></textarea>
          </div>
          <div class="field">
            <label for="diff-b">Changed text</label>
            <textarea id="diff-b" class="textarea" style="min-height:200px;"></textarea>
          </div>
        </div>
        <div class="actions">
          <button id="diff-run" class="btn btn-accent" type="button">Compare</button>
          <span class="chip"><span id="diff-added-count">0</span> added</span>
          <span class="chip"><span id="diff-removed-count">0</span> removed</span>
        </div>
        <div class="field">
          <label>Result</label>
          <div id="diff-result" class="result-box diff-box"></div>
        </div>
      </section>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
    <div class="ad-slot ad-slot--bottom" aria-label="Advertisement"></div>
  </main>

  <div id="site-footer"></div>
  <script src="../../js/layout.js" data-root="../../"></script>
  <script src="../../js/ads.js"></script>
  <script src="script.js"></script>
</body>
</html>
