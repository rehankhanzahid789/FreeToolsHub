  <style>
    .inv-items-table { width:100%; border-collapse:collapse; margin-top:8px; }
    .inv-items-table th { text-align:left; font-size:0.8rem; color:var(--color-text-muted); padding:6px 6px; border-bottom:1px solid var(--color-border); }
    .inv-items-table td { padding:6px; vertical-align:middle; }
    .inv-items-table input { width:100%; padding:8px; border:1px solid var(--color-border); border-radius:6px; background:var(--color-surface); color:var(--color-text); }
    .inv-remove-row { background:none; border:none; color:var(--color-danger); cursor:pointer; font-size:1.1rem; padding:4px 8px; }
    .inv-preview-wrap { background:var(--color-surface); border:1px solid var(--color-border); border-radius:12px; padding:32px; margin-top:20px; color:#1E2A36; }
    .inv-preview-wrap * { color:#1E2A36; }
    .inv-preview-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:16px; }
    .inv-preview-title { font-size:1.8rem; font-weight:800; letter-spacing:1px; }
    .inv-preview-parties { display:flex; justify-content:space-between; gap:20px; margin-bottom:24px; flex-wrap:wrap; }
    .inv-preview-parties h4 { margin:0 0 6px; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; color:#7a8a99; }
    .inv-preview-parties p { margin:0; white-space:pre-line; font-size:0.92rem; }
    .inv-preview-table { width:100%; border-collapse:collapse; margin-bottom:20px; }
    .inv-preview-table th { text-align:left; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; color:#7a8a99; border-bottom:2px solid #E1E9F0; padding:8px 6px; }
    .inv-preview-table td { padding:8px 6px; border-bottom:1px solid #E1E9F0; font-size:0.92rem; }
    .inv-preview-table td.num, .inv-preview-table th.num { text-align:right; }
    .inv-preview-totals { margin-left:auto; width:280px; }
    .inv-preview-totals div { display:flex; justify-content:space-between; padding:6px 0; font-size:0.92rem; }
    .inv-preview-totals .inv-grand-total { border-top:2px solid #1E2A36; font-weight:800; font-size:1.15rem; margin-top:6px; padding-top:10px; }
    .inv-preview-notes { margin-top:24px; font-size:0.85rem; color:#566677; white-space:pre-line; }
    @media print {
      body * { visibility: hidden; }
      .inv-preview-wrap, .inv-preview-wrap * { visibility: visible; }
      .inv-preview-wrap { position: absolute; top:0; left:0; width:100%; border:none; }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>Invoice Generator</h1>
      <p>Fill in the details below, watch the preview update live, then print or save it as a PDF.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel" style="grid-column: 1 / -1;">
        <div class="row">
          <div class="field">
            <label style="font-weight:700;color:var(--color-primary-dark);">From (your business)</label>
            <textarea id="inv-from" class="textarea" style="min-height:90px;" placeholder="Your Business Name
123 Main St, City
you@email.com"></textarea>
          </div>
          <div class="field">
            <label style="font-weight:700;color:var(--color-primary-dark);">Bill to (client)</label>
            <textarea id="inv-to" class="textarea" style="min-height:90px;" placeholder="Client Name
456 Client Ave, City
client@email.com"></textarea>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="inv-number">Invoice #</label>
            <input id="inv-number" class="input" type="text" value="INV-001" />
          </div>
          <div class="field">
            <label for="inv-date">Invoice date</label>
            <input id="inv-date" class="input" type="date" />
          </div>
          <div class="field">
            <label for="inv-due">Due date</label>
            <input id="inv-due" class="input" type="date" />
          </div>
          <div class="field">
            <label for="inv-currency">Currency</label>
            <select id="inv-currency" class="select">
              <option value="$">USD ($)</option>
              <option value="€">EUR (€)</option>
              <option value="£">GBP (£)</option>
              <option value="₹">INR (₹)</option>
              <option value="Rs ">PKR (Rs)</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Line items</label>
          <table class="inv-items-table">
            <thead>
              <tr><th style="width:44%;">Description</th><th>Qty</th><th>Unit price</th><th></th></tr>
            </thead>
            <tbody id="inv-items-body"></tbody>
          </table>
          <div class="actions">
            <button id="inv-add-item" class="btn btn-outline" type="button">+ Add line item</button>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="inv-tax">Tax (%)</label>
            <input id="inv-tax" class="input" type="number" min="0" step="0.01" value="0" />
          </div>
          <div class="field">
            <label for="inv-discount">Discount (%)</label>
            <input id="inv-discount" class="input" type="number" min="0" step="0.01" value="0" />
          </div>
        </div>

        <div class="field">
          <label for="inv-notes">Notes</label>
          <textarea id="inv-notes" class="textarea" style="min-height:60px;" placeholder="Thank you for your business!"></textarea>
        </div>

        <div class="actions">
          <button id="inv-print" class="btn btn-accent" type="button">Print / Save as PDF</button>
        </div>

        <div id="inv-preview" class="inv-preview-wrap">
          <div class="inv-preview-header">
            <div>
              <div class="inv-preview-title">INVOICE</div>
              <div id="inv-p-number" style="color:#566677;"></div>
            </div>
            <div style="text-align:right;font-size:0.9rem;color:#566677;">
              <div>Date: <span id="inv-p-date"></span></div>
              <div>Due: <span id="inv-p-due"></span></div>
            </div>
          </div>
          <div class="inv-preview-parties">
            <div><h4>From</h4><p id="inv-p-from"></p></div>
            <div><h4>Bill to</h4><p id="inv-p-to"></p></div>
          </div>
          <table class="inv-preview-table">
            <thead><tr><th>Description</th><th class="num">Qty</th><th class="num">Unit price</th><th class="num">Amount</th></tr></thead>
            <tbody id="inv-p-items"></tbody>
          </table>
          <div class="inv-preview-totals">
            <div><span>Subtotal</span><span id="inv-p-subtotal"></span></div>
            <div id="inv-p-discount-row"><span>Discount</span><span id="inv-p-discount"></span></div>
            <div id="inv-p-tax-row"><span>Tax</span><span id="inv-p-tax"></span></div>
            <div class="inv-grand-total"><span>Total</span><span id="inv-p-total"></span></div>
          </div>
          <div class="inv-preview-notes" id="inv-p-notes"></div>
        </div>
      </section>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
    <div class="ad-slot ad-slot--bottom" aria-label="Advertisement"></div>
  </main>

  <div id="site-footer"></div>

  <script src="../../js/ads.js"></script>

</body>
</html>
