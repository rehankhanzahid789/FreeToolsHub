<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>Discount Calculator</h1>
      <p>Enter an original price and discount to see the final price and how much you save.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel">
        <div class="row">
          <div class="field">
            <label for="dc-price">Original price</label>
            <input id="dc-price" class="input" type="number" min="0" step="0.01" placeholder="e.g. 100" />
          </div>
          <div class="field">
            <label for="dc-percent">Discount %</label>
            <input id="dc-percent" class="input" type="number" min="0" max="100" step="0.1" placeholder="e.g. 25" />
          </div>
        </div>

        <div id="dc-error" class="error-box" hidden></div>

        <div class="stat-grid">
          <div class="stat"><div id="dc-final" class="stat__value">—</div><div class="stat__label">Final price</div></div>
          <div class="stat"><div id="dc-saved" class="stat__value">—</div><div class="stat__label">You save</div></div>
        </div>
      </section>

      <aside>
        <!-- Adsterra: paste sidebar/native ad code below this comment -->
        <div class="ad-slot ad-slot--sidebar" aria-label="Advertisement"></div>
      </aside>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
    <div class="ad-slot ad-slot--bottom" aria-label="Advertisement"></div>
  </main>

  <div id="site-footer"></div>
  <script src="../../js/layout.js" data-root="../../"></script>
  <script src="../../js/ads.js"></script>
