<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>Loan / EMI Calculator</h1>
      <p>Enter the loan amount, interest rate and term to see your monthly payment and total cost.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel">
        <div class="row">
          <div class="field">
            <label for="lc-principal">Loan amount</label>
            <input id="lc-principal" class="input" type="number" min="0" step="0.01" placeholder="e.g. 20000" />
          </div>
          <div class="field">
            <label for="lc-rate">Annual interest rate (%)</label>
            <input id="lc-rate" class="input" type="number" min="0" step="0.01" placeholder="e.g. 7.5" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="lc-term">Loan term</label>
            <input id="lc-term" class="input" type="number" min="1" step="1" placeholder="e.g. 5" />
          </div>
          <div class="field">
            <label for="lc-term-unit">Term unit</label>
            <select id="lc-term-unit" class="select">
              <option value="years">Years</option>
              <option value="months">Months</option>
            </select>
          </div>
        </div>

        <div id="lc-error" class="error-box" hidden></div>

        <div class="stat-grid">
          <div class="stat"><div id="lc-payment" class="stat__value">—</div><div class="stat__label">Monthly payment</div></div>
          <div class="stat"><div id="lc-total-interest" class="stat__value">—</div><div class="stat__label">Total interest</div></div>
          <div class="stat"><div id="lc-total-paid" class="stat__value">—</div><div class="stat__label">Total repayment</div></div>
        </div>
      </section>

      <aside>
        <!-- Adsterra: paste sidebar/native ad code below this comment -->
        <div class="ad-slot ad-slot--sidebar" aria-label="Advertisement"></div>
      </aside>
    </div>

    <!-- Adsterra: paste bottom banner ad code below this comment -->
    <div class="ad-slot ad-slot--bottom" aria-label="Advertisement"></div>
  </main>

  <div id="site-footer"></div>
  <script src="../../js/layout.js" data-root="../../"></script>
  <script src="../../js/ads.js"></script>
  <script src="script.js"></script>
</body>
</html>
