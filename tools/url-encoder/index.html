<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="tool-header">
      <a class="back-link" href="../../index.html">← All tools</a>
      <h1>URL Encoder / Decoder</h1>
      <p>Encode text for safe use in URLs, or decode a percent-encoded string back to plain text.</p>
    </div>

    <!-- Adsterra: paste banner ad code below this comment -->
    <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>

    <div class="tool-layout">
      <section class="tool-card-panel">
        <div class="field">
          <label for="url-input">Input</label>
          <textarea id="url-input" class="textarea" placeholder="Paste text or a URL…" style="min-height:140px;"></textarea>
        </div>

        <div class="field">
          <label class="checkbox-row" style="font-weight:600;color:var(--color-primary-dark);">
            <input type="checkbox" id="url-component" checked />
            Encode/decode as URI component (also escapes &amp;, =, ?, /)
          </label>
        </div>

        <div class="actions">
          <button id="url-encode" class="btn btn-accent" type="button">Encode</button>
          <button id="url-decode" class="btn btn-primary" type="button">Decode</button>
          <button id="url-copy" class="btn btn-outline" type="button">Copy result</button>
        </div>

        <div id="url-error" class="error-box" hidden></div>

        <div class="field">
          <label>Result</label>
          <textarea id="url-output" class="textarea" readonly style="min-height:140px;"></textarea>
        </div>
      </section>

      <aside>
        <!-- Adsterra: paste sidebar/native ad code below this comment -->
