<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FreeToolsHub — Free online tools, no signup</title>
  <meta name="description" content="A collection of fast, free browser tools: QR codes, password generator, JSON formatter, unit converter, and more." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/brand/logo-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/brand/logo-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/brand/logo-180.png" />
  <link rel="shortcut icon" href="assets/brand/favicon.ico" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="index.html">
        <img class="brand__mark" src="assets/brand/logo-64.png" alt="FreeToolsHub logo" />
        <span>FreeToolsHub</span>
      </a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Free tools that just work.</h1>
        <p>A growing collection of fast, private, no-signup web tools. Everything runs in your browser.</p>
        <div class="search-wrap">
          <input id="tool-search" type="search" placeholder="Search tools…" aria-label="Search tools" />
        </div>
      </div>
    </section>

    <div class="container">
      <!-- Adsterra: paste banner ad code below this comment -->
      <div class="ad-slot ad-slot--top" aria-label="Advertisement"></div>
    </div>

    <section class="tools-section">
      <div class="container">
        <h2 id="about">All tools</h2>
        <div id="tools-grid" class="tools-grid"></div>
        <p id="empty-state" class="empty-state" hidden>No tools match your search.</p>
      </div>
    </section>

    <div class="container">
      <!-- Adsterra: paste sidebar/native ad code below this comment -->
      <div class="ad-slot ad-slot--sidebar" aria-label="Advertisement"></div>
    </div>

    <div class="container">
      <!-- Adsterra: paste bottom banner ad code below this comment -->
      <div class="ad-slot ad-slot--bottom" aria-label="Advertisement"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <span>© <span id="year"></span> FreeToolsHub — Free tools, no signup.</span>
      <span><a href="index.html">Back to top</a></span>
    </div>
  </footer>

  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
  <script src="js/main.js"></script>
  <script src="js/ads.js"></script>
</body>
</html>
